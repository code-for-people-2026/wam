name: Conventional Commits

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  conventional-commits:
    name: Check PR title and commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node scripts/check-conventional-commits.mjs "$PR_TITLE"

      - name: Check commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git log --format=%s "$BASE_SHA..$HEAD_SHA" > /tmp/pr-commits.txt
          node scripts/check-conventional-commits.mjs --file /tmp/pr-commits.txt

  verify:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
